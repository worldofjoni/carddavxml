version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carddav-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - carddav-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///data/carddav.db
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080
    restart: unless-stopped
    networks:
      - carddav-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carddav-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    restart: unless-stopped
    networks:
      - carddav-network

volumes:
  carddav-data:

networks:
  carddav-network:
    driver: bridge
